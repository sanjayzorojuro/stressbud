<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
      body {
        margin: 0; padding: 0; font-family: "Inter", sans-serif;
      }
      .container {
        display: flex; flex-direction: column; gap: 10px; width: 100%; box-sizing: border-box; padding: 5px;
      }
      input {
        padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(30, 30, 40, 0.6); color: #fff; font-family: inherit; font-size: 0.95rem; width: 100%; box-sizing: border-box; outline: none;
      }
      input::placeholder { color: #aaa; }
      input:focus { border-color: #43e97b; }
      
      .row {
        display: flex; gap: 10px; width: 100%;
      }
      .btn {
        flex: 1; padding: 8px; font-size: 0.95rem; font-weight: 600;
        border-radius: 8px; border: none; cursor: pointer; transition: all 0.3s ease;
      }
      .btn-primary { background: #43e97b; color: #1a1a2e; }
      .btn-primary:hover { opacity: 0.8; }
      .btn-secondary { background: transparent; color: #e0e0e0; border: 1px solid rgba(255,255,255,0.2); }
      .btn-secondary:hover { background: rgba(255,255,255,0.1); }
      
      .divider {
        display: flex; align-items: center; text-align: center; color: #888; font-size: 0.85rem; padding: 5px 0;
      }
      .divider::before, .divider::after {
        content: ''; flex: 1; border-bottom: 1px solid #444;
      }
      .divider:not(:empty)::before { margin-right: .5em; }
      .divider:not(:empty)::after { margin-left: .5em; }

      #login-google-btn {
        width: 100%; padding: 8px 16px; font-size: 0.95rem; font-weight: 600;
        border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: #ffffff; color: #333;
        cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-sizing: border-box;
      }
      #login-google-btn:hover { background: #f0f0f0; }
      #login-google-btn svg { width: 18px; height: 18px; }
      #error-msg { color: #ff6b6b; font-size: 0.85rem; text-align: center; min-height: 1em; }
    </style>
  </head>
  <body>
    <div class="container">
      <input type="email" id="email" placeholder="Email Address" />
      <input type="password" id="password" placeholder="Password" />
      <div class="row">
        <button id="login-btn" class="btn btn-primary">Log In</button>
        <button id="signup-btn" class="btn btn-secondary">Sign Up</button>
      </div>
      <div id="error-msg"></div>
      <div class="divider">OR</div>
      <button id="login-google-btn">
        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><g><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path><path fill="none" d="M0 0h48v48H0z"></path></g></svg>
        Sign in with Google
      </button>
    </div>
    <script>
      function sendMessageToStreamlitClient(type, data) {
        const outData = Object.assign(
          { isStreamlitMessage: true, type: type },
          data
        );
        window.parent.postMessage(outData, "*");
      }

      function init() {
        sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });
        sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: 230 });
      }

      const firebaseConfig = {
        apiKey: "AIzaSyAJN8WSWCt1RnFVyGJC8UhTFoKDYBj-9iY",
        authDomain: "stressbud-cd631.firebaseapp.com",
        projectId: "stressbud-cd631",
        storageBucket: "stressbud-cd631.firebasestorage.app",
        messagingSenderId: "555328411369",
        appId: "1:555328411369:web:01523dc4afeb389170c278",
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const googleProvider = new firebase.auth.GoogleAuthProvider();

      function handleSuccess(user) {
        user.getIdToken().then((token) => {
          sendMessageToStreamlitClient("streamlit:setComponentValue", {
            value: {
              email: user.email,
              displayName: user.displayName || user.email.split('@')[0], 
              uid: user.uid,
              token: token,
            },
          });
        });
      }

      function handleError(error) {
        const errorMsg = document.getElementById("error-msg");
        let msg = error.message;
        if (error.code === 'auth/email-already-in-use') msg = "Email already in use. Please log in.";
        if (error.code === 'auth/wrong-password') msg = "Incorrect password.";
        if (error.code === 'auth/user-not-found') msg = "No user found with this email.";
        errorMsg.innerText = msg;
        console.error(error);
      }

      document.getElementById("login-google-btn").addEventListener("click", () => {
        auth.signInWithPopup(googleProvider).then((result) => handleSuccess(result.user)).catch(handleError);
      });

      document.getElementById("signup-btn").addEventListener("click", () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        document.getElementById("error-msg").innerText = "";
        if (!email || !password) return handleError({message: "Email and password required."});
        auth.createUserWithEmailAndPassword(email, password).then((result) => handleSuccess(result.user)).catch(handleError);
      });

      document.getElementById("login-btn").addEventListener("click", () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        document.getElementById("error-msg").innerText = "";
        if (!email || !password) return handleError({message: "Email and password required."});
        auth.signInWithEmailAndPassword(email, password).then((result) => handleSuccess(result.user)).catch(handleError);
      });

      window.onload = init;
    </script>
  </body>
</html>
