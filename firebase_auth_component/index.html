<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green: #6ee27a;
        --green-dim: rgba(110, 226, 122, 0.12);
        --green-line: rgba(110, 226, 122, 0.22);
        --border: rgba(255, 255, 255, 0.08);
        --text: #e8f0e8;
        --muted: #6a7a6a;
        --error: #f08080;
      }

      html,
      body {
        background: transparent;
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        height: 400px;
        overflow: hidden;
      }

      .card {
        width: 100%;
        padding: 0.25rem 0.5rem 0.5rem;
        animation: rise 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .btn-google {
        width: 100%;
        padding: 0.65rem 1rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 0.88rem;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        transition: all 0.2s ease;
        margin-bottom: 1rem;
      }
      .btn-google:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.15);
      }
      .btn-google svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1rem;
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.5px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .tabs {
        display: flex;
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 3px;
        margin-bottom: 0.9rem;
        gap: 3px;
      }
      .tab {
        flex: 1;
        padding: 0.42rem;
        font-size: 0.8rem;
        font-weight: 500;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        background: transparent;
        color: var(--muted);
        transition: all 0.18s ease;
        font-family: "DM Sans", sans-serif;
      }
      .tab.active {
        background: var(--green-dim);
        color: var(--green);
        border: 1px solid var(--green-line);
      }
      .tab:not(.active):hover {
        color: var(--text);
      }

      .field {
        margin-bottom: 0.7rem;
      }
      label {
        display: block;
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 0.28rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 0.58rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 0.88rem;
        outline: none;
        transition: border-color 0.2s ease;
      }
      input::placeholder {
        color: #2e3e2e;
      }
      input:focus {
        border-color: var(--green-line);
      }

      .btn-primary {
        width: 100%;
        padding: 0.65rem;
        margin-top: 0.4rem;
        border: none;
        border-radius: 9px;
        background: var(--green);
        color: #0d110d;
        font-family: "DM Sans", sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.18s ease;
      }
      .btn-primary:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }
      .btn-primary:active {
        transform: translateY(0);
      }
      .btn-primary.loading {
        opacity: 0.55;
        pointer-events: none;
      }

      .error-msg {
        font-size: 0.78rem;
        color: var(--error);
        text-align: center;
        min-height: 1em;
        margin-top: 0.5rem;
        line-height: 1.4;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <button class="btn-google" id="btn-google">
        <svg
          version="1.1"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 48 48"
        >
          <g>
            <path
              fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
            />
            <path
              fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
            />
            <path
              fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
            />
            <path
              fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
            />
          </g>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">
          Log in
        </button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">
          Sign up
        </button>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button class="btn-primary" id="btn-submit">Log in</button>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <script>
      function send(type, data) {
        window.parent.postMessage(
          Object.assign({ isStreamlitMessage: true, type }, data),
          "*",
        );
      }

      window.onload = function () {
        send("streamlit:componentReady", { apiVersion: 1 });
        send("streamlit:setFrameHeight", { height: 400 });
      };

      const firebaseConfig = {
        apiKey: "AIzaSyAJN8WSWCt1RnFVyGJC8UhTFoKDYBj-9iY",
        authDomain: "stressbud-cd631.firebaseapp.com",
        projectId: "stressbud-cd631",
        storageBucket: "stressbud-cd631.firebasestorage.app",
        messagingSenderId: "555328411369",
        appId: "1:555328411369:web:01523dc4afeb389170c278",
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const googleProvider = new firebase.auth.GoogleAuthProvider();

      let currentTab = "login";

      function switchTab(tab) {
        currentTab = tab;
        document
          .getElementById("tab-login")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("tab-signup")
          .classList.toggle("active", tab === "signup");
        document.getElementById("btn-submit").textContent =
          tab === "login" ? "Log in" : "Create account";
        document.getElementById("error-msg").textContent = "";
      }

      function setLoading(on) {
        document.getElementById("btn-submit").classList.toggle("loading", on);
        document.getElementById("btn-google").disabled = on;
      }

      const ERROR_MAP = {
        "auth/email-already-in-use":
          "That email is already registered — try logging in.",
        "auth/wrong-password": "Incorrect password.",
        "auth/user-not-found": "No account found with that email.",
        "auth/invalid-email": "Please enter a valid email address.",
        "auth/weak-password": "Password must be at least 6 characters.",
        "auth/popup-closed-by-user":
          "Sign-in popup was closed. Please try again.",
      };

      function showError(err) {
        document.getElementById("error-msg").textContent =
          ERROR_MAP[err.code] || err.message;
        setLoading(false);
      }

      function handleSuccess(user) {
        user.getIdToken().then((token) => {
          send("streamlit:setComponentValue", {
            value: {
              email: user.email,
              displayName: user.displayName || user.email.split("@")[0],
              uid: user.uid,
              token,
            },
          });
        });
      }

      document.getElementById("btn-google").addEventListener("click", () => {
        document.getElementById("error-msg").textContent = "";
        auth
          .signInWithPopup(googleProvider)
          .then((r) => handleSuccess(r.user))
          .catch(showError);
      });

      document.getElementById("btn-submit").addEventListener("click", () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        document.getElementById("error-msg").textContent = "";
        if (!email || !password) {
          document.getElementById("error-msg").textContent =
            "Please fill in both fields.";
          return;
        }
        setLoading(true);
        const action =
          currentTab === "login"
            ? auth.signInWithEmailAndPassword(email, password)
            : auth.createUserWithEmailAndPassword(email, password);
        action.then((r) => handleSuccess(r.user)).catch(showError);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("btn-submit").click();
      });
    </script>
  </body>
</html>
